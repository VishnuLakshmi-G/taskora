services:
  - type: web
    name: genai-task-manager-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && python app.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: JWT_SECRET_KEY
        fromSecret: jwt-secret
      - key: MONGODB_URI
        fromSecret: mongodb-uri
      - key: ALLOWED_ORIGINS
        fromSecret: allowed-origins
      - key: ENABLE_SCHEDULER
        value: false

  - type: web
    name: genai-task-manager-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_API_BASE
        fromService:
          type: web
          name: genai-task-manager-backend
          property: host